<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng nhập - Cấu hình xe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-header h2 {
      font-weight: 600;
      color: #1a1a1a;
    }
    .form-label {
      font-weight: 500;
    }
    .btn-primary {
      background: #0066cc;
      border: none;
      padding: 0.75rem;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-primary:hover {
      background: #0052a3;
      transform: translateY(-2px);
    }
    .text-muted a {
      color: #0066cc;
      text-decoration: none;
    }
    .text-muted a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h2>Đăng nhập</h2>
      <p class="text-muted">Để lưu và chia sẻ cấu hình xe của bạn</p>
    </div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Tên đăng nhập / Email</label>
        <input type="text" class="form-control" id="username" name="username" required 
               placeholder="Nhập tên đăng nhập hoặc email">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Mật khẩu</label>
        <input type="password" class="form-control" id="password" name="password" required 
               placeholder="••••••••">
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
        </div>
        <a href="#" class="text-muted">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
    </form>

    <div class="text-center mt-4">
      <p class="text-muted">Chưa có tài khoản? <a href="/Account/Register">Đăng ký ngay</a></p>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Lưu token (cách đơn giản - bạn nên dùng HttpOnly cookie trong thực tế)
          localStorage.setItem('token', data.token);
          alert('Đăng nhập thành công!');
          window.location.href = '/'; // hoặc '/Home/Index'
        } else {
          alert(data.message || 'Đăng nhập thất bại. Vui lòng kiểm tra lại thông tin.');
        }
      } catch (err) {
        console.error(err);
        alert('Có lỗi xảy ra. Vui lòng thử lại sau.');
      }
    });
  </script>

</body>
</html>
