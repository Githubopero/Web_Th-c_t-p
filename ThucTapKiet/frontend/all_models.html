<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tất cả mẫu xe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }

    .model-card {
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      background: white;
      transition: 0.3s;
    }

    .model-card:hover {
      transform: translateY(-5px);
    }

    .model-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .model-desc {
      font-size: 14px;
      color: #6c757d;
    }

    .specs {
      font-size: 13px;
    }

    .specs span {
      font-weight: 600;
    }

    .series-title {
      border-left: 5px solid #0d6efd;
      padding-left: 10px;
      margin-top: 40px;
    }
  </style>
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="#">BMV Car</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="index4.html">Các dòng xe</a></li>
        <li class="nav-item"><a class="nav-link active" href="all_models.html">Tất cả các mẫu xe</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Cấu hình của tôi</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#authModal">Đăng nhập / Đăng ký</button>
      </div>
    </div>
  </div>
</nav>

<!-- Hero Banner -->
<section class="bg-primary text-white text-center py-5">
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">Khám Phá Các Dòng Xe</h1>
    <p class="lead mb-0">Chọn dòng xe yêu thích và bắt đầu tùy chỉnh cấu hình xe mơ ước của bạn</p>
  </div>
</section>

<!-- Modal Đăng nhập / Đăng ký -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Đăng nhập / Đăng ký</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3">
          <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Đăng nhập</a></li>
          <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#registerTab">Đăng ký</a></li>
        </ul>
        <div class="tab-content">
          <!-- Login -->
          <div class="tab-pane fade show active" id="loginTab">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="loginUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="loginPassword" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
            </form>
          </div>
          <!-- Register -->
          <div class="tab-pane fade" id="registerTab">
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="regUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="regEmail" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="regPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" id="reregPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" class="form-control" id="fulName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" id="phoneNumber" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Đăng ký</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="container py-4">
  <h2 class="fw-bold mb-4">Tất cả mẫu xe</h2>
  <div id="allModels"></div>
</div>

<script>
const API_BASE = 'https://localhost:7124/api';


// ================= Load toàn bộ =================
async function loadAllModels() {
  try {
    const seriesRes = await fetch(`${API_BASE}/SeriesApi`);
    const { data: seriesList } = await seriesRes.json();

    const container = document.getElementById('allModels');
    container.innerHTML = '';

    for (const series of seriesList) {

      // Title dòng xe
      container.innerHTML += `
        <h4 class="series-title fw-bold">${series.tenDongXe}</h4>
      `;

      // Lấy mẫu xe theo dòng
      const modelRes = await fetch(`${API_BASE}/ModelApi/by-series/${series.id}`);
      const { data: models } = await modelRes.json();

      if (!models.length) {
        container.innerHTML += '<p class="text-muted">Chưa có mẫu xe.</p>';
        continue;
      }

      // Render từng mẫu
      models.forEach(model => {

        let specs = {};
        try {
          specs = model.thongSoKyThuat
            ? JSON.parse(model.thongSoKyThuat)
            : {};
        } catch {}

        container.innerHTML += `
          <div class="model-card p-3 mb-4">

            <div class="row g-3 align-items-center">

              <div class="col-md-4 col-lg-3">
                <img src="${model.anhDaiDien || 'https://via.placeholder.com/400x200'}"
                     class="model-img rounded">
              </div>

              <div class="col-md-8 col-lg-9">

                <div class="d-flex justify-content-between">
                  <h5 class="fw-bold">${model.tenMauXe}</h5>
                  <div class="fs-5 text-success fw-bold">
                    ${model.giaCoBan.toLocaleString('vi-VN')} ₫
                  </div>
                </div>

                <p class="model-desc">
                  ${model.moTa || ''}
                </p>

                <div class="specs row">
                  <div class="col-md-4">
                    <div><span>Năm:</span> ${model.namSanXuat || '-'}</div>
                    <div><span>Động cơ:</span> ${specs.dong_co || '-'}</div>
                  </div>

                  <div class="col-md-4">
                    <div><span>Công suất:</span> ${specs.cong_suat || '-'}</div>
                    <div><span>Hộp số:</span> ${specs.hop_so || '-'}</div>
                  </div>

                  <div class="col-md-4">
                    <div><span>Dẫn động:</span> ${specs.dan_dong || '-'}</div>
                    <div><span>Tăng tốc:</span> ${specs.tang_toc || '-'}</div>
                  </div>
                </div>

                <div class="mt-3">
                  <a href="model-detail.html?modelId=${model.id}"
                     class="btn btn-outline-primary btn-sm me-2">Chi tiết</a>

                  <a href="config2.html?modelId=${model.id}"
                     class="btn btn-primary btn-sm">Tùy chỉnh</a>
                </div>

              </div>
            </div>
          </div>
        `;
      });
    }

  } catch (err) {
    alert('Lỗi tải dữ liệu: ' + err.message);
  }
}


// Start
loadAllModels();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
