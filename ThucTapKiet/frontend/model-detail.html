<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi Tiết Mẫu Xe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; }
.hero-section{
  background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
  url('https://placehold.co/1920x600?text=BMW+Hero') center/cover no-repeat;
  color:white;
  padding:120px 0 80px;
  text-align:center;
}
.car-img-main{
  max-height:500px;
  object-fit:contain;
  border-radius:12px;
}
.price-tag{
  font-size:2rem;
  font-weight:bold;
  color:#198754;
}
</style>
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="#">BMV Car</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="index4.html">Các dòng xe</a></li>
        <li class="nav-item"><a class="nav-link active" href="all_models.html">Tất cả các mẫu xe</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Cấu hình của tôi</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#authModal">Đăng nhập / Đăng ký</button>
      </div>
    </div>
  </div>
</nav>

<!-- Hero Banner -->
<section class="bg-primary text-white text-center py-5">
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">Khám Phá Các Dòng Xe</h1>
    <p class="lead mb-0">Chọn dòng xe yêu thích và bắt đầu tùy chỉnh cấu hình xe mơ ước của bạn</p>
  </div>
</section>

<!-- Modal Đăng nhập / Đăng ký -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Đăng nhập / Đăng ký</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3">
          <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Đăng nhập</a></li>
          <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#registerTab">Đăng ký</a></li>
        </ul>
        <div class="tab-content">
          <!-- Login -->
          <div class="tab-pane fade show active" id="loginTab">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="loginUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="loginPassword" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
            </form>
          </div>
          <!-- Register -->
          <div class="tab-pane fade" id="registerTab">
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="regUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="regEmail" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="regPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" id="reregPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" class="form-control" id="fulName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" id="phoneNumber" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Đăng ký</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- HERO -->
<section class="hero-section">
  <div class="container">
    <h1 id="modelTitle">Đang tải...</h1>
    <p id="modelDesc"></p>
    <div class="price-tag" id="modelPrice"></div>
  </div>
</section>

<div class="container py-5">

  <div class="row">

    <!-- LEFT -->
    <div class="col-lg-7">

      <div id="carCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner" id="carouselInner">
          <div class="carousel-item active">
            <img src="https://placehold.co/800x500?text=Loading"
                 class="d-block w-100 car-img-main">
          </div>
        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#carCarousel" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carCarousel" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-lg-5">

      <div class="card mb-4">
        <div class="card-header bg-primary text-white">Thông số kỹ thuật</div>
        <div class="card-body" id="specTable">
          <p class="text-muted">Đang tải...</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header bg-success text-white">Mô tả</div>
        <div class="card-body" id="modelMoTa"></div>
      </div>

    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ================= CONFIG =================
const API_BASE = "https://localhost:7124/api"; 
const urlParams = new URLSearchParams(window.location.search);
const modelId = urlParams.get("modelId") || 1;

// ================= HELPER =================
function fallbackImage(img){
  img.onerror = null;
  img.src = "https://placehold.co/800x500?text=No+Image";
}

// ================= LOAD DATA =================
async function loadModelDetail(){

  try{

    const response = await fetch(`${API_BASE}/ModelApi/${modelId}`);

    if(!response.ok) throw new Error("API không phản hồi");

    const data = await response.json();

    // ======= BASIC INFO =======
    document.getElementById("modelTitle").textContent =
      data.tenMauXe || "Chưa có tên";

    document.getElementById("modelDesc").textContent =
      data.moTa || "Mẫu xe cao cấp";

    document.getElementById("modelPrice").textContent =
      data.giaCoBan
        ? data.giaCoBan.toLocaleString("vi-VN") + " ₫"
        : "Liên hệ";

    document.getElementById("modelMoTa").innerHTML =
      data.moTa ? `<p>${data.moTa}</p>` : "Không có mô tả";

    // ======= SPEC TABLE =======
    const specDiv = document.getElementById("specTable");

    if(data.thongSoKyThuat){
      let html = `<table class="table table-striped">
      <thead><tr><th>Thông số</th><th>Giá trị</th></tr></thead><tbody>`;

      for(const [key,value] of Object.entries(data.thongSoKyThuat)){
        html += `<tr><td>${key}</td><td>${value}</td></tr>`;
      }

      html += "</tbody></table>";
      specDiv.innerHTML = html;
    }else{
      specDiv.innerHTML = "<p class='text-muted'>Không có thông số.</p>";
    }

    // ======= CAROUSEL =======
    const carouselInner = document.getElementById("carouselInner");
    carouselInner.innerHTML = "";

    if(data.images && data.images.length > 0){

      data.images.forEach((img,index)=>{

        const active = index === 0 ? "active" : "";

        carouselInner.innerHTML += `
        <div class="carousel-item ${active}">
          <img src="${img.duongDanAnh}"
               onerror="fallbackImage(this)"
               class="d-block w-100 car-img-main">
        </div>`;

      });

    }else{

      carouselInner.innerHTML = `
      <div class="carousel-item active">
        <img src="https://placehold.co/800x500?text=No+Image"
             class="d-block w-100 car-img-main">
      </div>`;

    }

  }catch(error){

    console.error(error);

    document.getElementById("specTable").innerHTML =
      "<div class='alert alert-danger'>Không kết nối được backend</div>";

  }

}

loadModelDetail();

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
