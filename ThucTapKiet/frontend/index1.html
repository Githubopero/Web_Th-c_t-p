<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trang Chủ - WebCauHinhXe</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; }
    .series-card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }
    .series-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    }
    .series-img {
      height: 200px;
      object-fit: cover;
      filter: brightness(90%);
      transition: filter 0.3s;
    }
    .series-card:hover .series-img {
      filter: brightness(100%);
    }
    .series-info {
      padding: 1.5rem;
      text-align: center;
    }
    .series-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #0d6efd;
    }
    .models-list {
      display: none;
      margin-top: 20px;
    }
    .model-card {
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .model-card:hover {
      transform: scale(1.03);
    }
    .model-img {
      height: 150px;
      object-fit: cover;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }
    .model-info {
      padding: 1rem;
      text-align: center;
    }
    .model-price {
      color: #198754;
      font-weight: bold;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="#">TCCar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Dòng xe</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Cấu hình của tôi</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#authModal">Đăng nhập / Đăng ký</button>
      </div>
    </div>
  </div>
</nav>

<!-- Hero Banner -->
<section class="bg-primary text-white text-center py-5">
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">Khám Phá Các Dòng Xe</h1>
    <p class="lead mb-0">Chọn dòng xe yêu thích và bắt đầu tùy chỉnh cấu hình xe mơ ước của bạn</p>
  </div>
</section>

<!-- Danh sách dòng xe (ngang như BMW) -->
<div class="container py-5">
  <div class="row g-4" id="seriesList">
    <!-- Các card dòng xe sẽ được render động bằng JS -->
  </div>
</div>

<!-- Modal Đăng nhập / Đăng ký -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="authModalLabel">Đăng nhập / Đăng ký</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3">
          <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#loginTab">Đăng nhập</a></li>
          <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#registerTab">Đăng ký</a></li>
        </ul>
        <div class="tab-content">
          <!-- Login -->
          <div class="tab-pane fade show active" id="loginTab">
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="loginUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="loginPassword" required>
              </div>
              <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
            </form>
          </div>
          <!-- Register -->
          <div class="tab-pane fade" id="registerTab">
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <input type="text" class="form-control" id="regUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="regEmail" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="regPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" id="reregPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Họ tên</label>
                <input type="text" class="form-control" id="fulName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" id="phoneNumber" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Đăng ký</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ================== CONFIG ==================
const API_BASE = 'https://localhost:7124/api'; // Thay bằng URL backend thật

// ================== Load danh sách dòng xe ==================
async function loadSeries() {
  try {
    const res = await fetch(`${API_BASE}/SeriesApi`);
    const { data } = await res.json(); // giả sử API trả { message, data: [] }

    const seriesList = document.getElementById('seriesList');
    seriesList.innerHTML = '';

    data.forEach(series => {
      seriesList.innerHTML += `
        <div class="col-md-4 col-lg-3">
          <div class="series-card" data-series-id="${series.id}">
            <img src="${series.anhDaiDien || 'https://via.placeholder.com/400x200?text=' + series.tenDongXe}" class="series-img w-100" alt="${series.tenDongXe}">
            <div class="series-info">
              <h3 class="series-title">${series.tenDongXe}</h3>
              <p class="text-muted">${series.moTa || 'Không có mô tả'}</p>
            </div>
          </div>
          <div class="models-list">
            <!-- Danh sách mẫu xe sẽ load khi click -->
          </div>
        </div>`;
    });

    // Thêm event click cho series card
    document.querySelectorAll('.series-card').forEach(card => {
      card.addEventListener('click', async () => {
        const seriesId = card.dataset.seriesId;
        const modelsContainer = card.nextElementSibling; // .models-list

        if (modelsContainer.style.display === 'block') {
          modelsContainer.style.display = 'none';
          return;
        }

        await loadModels(seriesId, modelsContainer);
        modelsContainer.style.display = 'block';
      });
    });
  } catch (err) {
    alert('Lỗi tải dòng xe: ' + err.message);
  }
}

// ================== Load danh sách mẫu xe theo dòng ==================
async function loadModels(seriesId, container) {
  try {
    const res = await fetch(`${API_BASE}/ModelApi/by-series/${seriesId}`);
    const { data } = await res.json();

    container.innerHTML = '<h5 class="text-center mb-3">Các mẫu xe trong dòng</h5><div class="row g-3">';

    if (data.length === 0) {
      container.innerHTML += '<p class="text-center text-muted">Chưa có mẫu xe nào cho dòng này.</p>';
    } else {
      data.forEach(model => {
        container.innerHTML += `
          <div class="col-12">
            <div class="model-card bg-white p-2">
              <img src="${model.anhDaiDien || 'https://via.placeholder.com/300x150?text=' + model.tenMauXe}" class="model-img w-100" alt="${model.tenMauXe}">
              <div class="model-info">
                <h6>${model.tenMauXe}</h6>
                <p class="model-price">${model.giaCoBan.toLocaleString('vi-VN')} ₫</p>
                <a href="model-detail.html?modelId=${model.id}" class="btn btn-outline-primary btn-sm me-2">Chi tiết</a>
                <a href="config2.html?modelId=${model.id}" class="btn btn-primary btn-sm">Tùy chỉnh</a>
              </div>
            </div>
          </div>`;
      });
    }

    container.innerHTML += '</div>';
  } catch (err) {
    container.innerHTML = `<div class="alert alert-danger">Lỗi tải mẫu xe: ${err.message}</div>`;
  }
}

// Load khi trang mở
loadSeries();
</script>
</body>
</html>
