<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your BMW</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f5f6f8;
}

/* ===== SERIES ===== */
#seriesList{
  scroll-behavior:smooth;
}

.series-card{
  min-width:320px;
  height:420px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:all .3s ease;
}

.series-img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(80%);
  transition:.3s;
}

.series-overlay{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:2rem;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.series-title{
  color:white;
  font-size:2rem;
  font-weight:bold;
}

.series-card:hover .series-img{
  filter:brightness(100%);
}

.series-card.active{
  border:3px solid #0d6efd;
}

.series-card.active .series-img{
  filter:brightness(100%);
  transform:scale(1.05);
}

/* ===== MODEL ===== */
.model-card{
  border-radius:16px;
  overflow:hidden;
  transition:.3s;
}

.model-card:hover{
  transform:translateY(-8px);
}

.model-img{
  height:200px;
  object-fit:cover;
}

</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <span class="navbar-brand fw-bold text-primary">Build Your Car</span>
  </div>
</nav>

<!-- Banner -->
<section class="bg-primary text-white text-center py-5">
  <h1 class="fw-bold">Chọn dòng xe</h1>
  <p>Bắt đầu cấu hình xe mơ ước của bạn</p>
</section>

<!-- SERIES -->
<div class="container-fluid py-5">
  <div class="d-flex overflow-auto gap-4 px-4" id="seriesList"></div>
</div>

<!-- MODELS -->
<div class="container pb-5">
  <div id="modelsSection"></div>
</div>

<script>
const API_BASE = 'https://localhost:7124/api';

/* ================= LOAD SERIES ================= */
async function loadSeries(){
  try{
    const res = await fetch(`${API_BASE}/SeriesApi`);
    const {data} = await res.json();

    const list = document.getElementById('seriesList');
    list.innerHTML='';

    data.forEach(series=>{
      list.innerHTML+=`
      <div class="series-card" data-id="${series.id}">
        <img loading="lazy"
             src="${series.anhDaiDien || 'https://via.placeholder.com/600x800'}"
             class="series-img">
        <div class="series-overlay">
          <div class="series-title">${series.tenDongXe}</div>
          <p class="text-white">${series.moTa || ''}</p>
        </div>
      </div>`;
    });

    /* CLICK SERIES */
    document.querySelectorAll('.series-card').forEach(card=>{
      card.addEventListener('click', async ()=>{

        document.querySelectorAll('.series-card')
          .forEach(c=>c.classList.remove('active'));

        card.classList.add('active');

        const id = card.dataset.id;
        await loadModels(id);
      });
    });

  }catch(err){
    alert("Lỗi load series: "+err.message);
  }
}

/* ================= LOAD MODELS ================= */
async function loadModels(seriesId){
  try{
    const container = document.getElementById('modelsSection');

    container.innerHTML=`
      <div class="text-center py-5">
        <div class="spinner-border text-primary"></div>
      </div>`;

    const res = await fetch(`${API_BASE}/ModelApi/by-series/${seriesId}`);
    const {data} = await res.json();

    container.innerHTML=`
      <h2 class="mb-4">Các mẫu xe</h2>
      <div class="row g-4"></div>`;

    const row = container.querySelector('.row');

    if(data.length===0){
      row.innerHTML='<p class="text-muted">Chưa có mẫu xe</p>';
      return;
    }

    data.forEach(model=>{
      row.innerHTML+=`
      <div class="col-md-4 col-lg-3">
        <div class="card model-card shadow border-0 h-100">
          <img loading="lazy"
               src="${model.anhDaiDien || 'https://via.placeholder.com/400'}"
               class="model-img">
          <div class="card-body text-center">
            <h5>${model.tenMauXe}</h5>
            <p class="fw-bold text-success">
              ${model.giaCoBan.toLocaleString('vi-VN')} ₫
            </p>
            <a href="model-detail.html?modelId=${model.id}"
               class="btn btn-outline-primary btn-sm w-100 mb-2">
               Chi tiết
            </a>
            <a href="config2.html?modelId=${model.id}"
               class="btn btn-primary w-100">
               Build
            </a>
          </div>
        </div>
      </div>`;
    });

  }catch(err){
    document.getElementById('modelsSection').innerHTML=
      `<div class="alert alert-danger">${err.message}</div>`;
  }
}

/* INIT */
loadSeries();
</script>

</body>
</html>
